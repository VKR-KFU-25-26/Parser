version: '3.9'

services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - blockchain_network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KRAFTENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - blockchain_network

  hangfire_postgres:
    image: postgres:16
    container_name: hangfire_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hangfiredb
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - blockchain_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  jurisseeker_postgres:
    image: postgres:16
    container_name: jurisseeker_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jurisseeker
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blockchain_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  courtparser-worker:
    build:
      context: C:/VKR.Back/CourtParser
      dockerfile: C:/VKR.Back/CourtParser/CourtParser.Worker/Dockerfile
    container_name: courtparser-worker
    ports:
      - "5002:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=hangfire_postgres;Port=5432;Database=hangfiredb;Username=postgres;Password=postgres
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      hangfire_postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - blockchain_network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  jurisseeker-web:
    build:
      context: C:/VKR.Back.Main/JurisSeeker
      dockerfile: C:/VKR.Back.Main/JurisSeeker/JurisSeeker.Web/Dockerfile
    container_name: jurisseeker-web
    ports:
      - "5001:8070"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8070
      - Kestrel__Endpoints__Http__Url=http://+:8070 
      - ConnectionStrings__DefaultConnection=Host=jurisseeker_postgres;Port=5432;Database=jurisseeker;Username=postgres;Password=postgres
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      jurisseeker_postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      courtparser-worker:
        condition: service_started
    networks:
      - blockchain_network
    restart: unless-stopped


volumes:
  kafka_data:
  pg_data:
  postgres_data:

networks:
  blockchain_network:
    driver: bridge